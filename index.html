<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engineering Life</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* PIX Button style in footer */
        .pix-button {
            background-color: var(--accent);
            color: #1c1b2e;
            font-size: 15px;
            font-weight: 700;
            border: none;
            padding: 10px 16px;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.18s var(--ease), background-color 0.18s var(--ease);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .pix-button:hover {
            background-color: var(--accent-600);
            transform: translateY(-2px);
        }
        /* footer nav layout update */
        #app-footer nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px;
        }
    </style>
</head>
<body>

    <!-- Splash / loading screen: shown while the session is being checked,
         so the user never sees a flash of the login page before we know
         whether they're already signed in. -->
    <div id="loading-screen">
        <div class="loading-content">
            <img src="img/app-logo.png" alt="Engineering Life" class="loading-logo">
            <div class="loading-spinner"></div>
            <p class="loading-text">Loading your engineering journey…</p>
        </div>
    </div>

    <main>

        <section id="login-page" class="page">
            <div class="page-content">
                <img src="img/app-logo.png" alt="App Icon" class="app-icon-large">
                <h1>Engineering Life</h1>
                <p>Empowering the Engineering Journey</p>
                <form id="login-form">
                    <input type="email" id="email-input" placeholder="Enter your email" required autocomplete="email">
                    <button type="submit" id="login-submit-btn">Send Magic Link</button>
                </form>
                <div id="login-message" class="message" role="status" aria-live="polite"></div>
            </div>
        </section>

        <section id="student-info-page" class="page hidden">
            <div class="page-content">
                <h2>Complete Your Profile</h2>
                <form id="student-info-form">
                    <input type="text" id="name-input" placeholder="Full Name" required autocomplete="name">
                    <input type="tel" id="mobile-input" placeholder="Mobile Number" required autocomplete="tel">
                    <select id="branch-select" required>
                        <option value="" disabled selected>Select Your Branch</option>
                        <option value="CSE">CSE</option>
                        <option value="ECE">ECE</option>
                        <option value="AI">AI</option>
                        <option value="AIML">AIML</option>
                        <option value="IOT">IOT</option>
                    </select>
                    <button type="submit" id="student-info-submit-btn">Save & Continue</button>
                </form>
                <div id="student-info-message" class="message" role="status" aria-live="polite"></div>
            </div>
        </section>

        <section id="welcome-page" class="page hidden">
             <div class="page-content text-center">
                <img src="img/app-logo.png" alt="App Icon" class="app-icon-large">
                <h2 style="text-align:center;">Welcome, <span id="welcome-name"></span>!</h2>
                <p>Your branch: <span id="welcome-branch"></span></p>
                <button id="lets-go-btn">Let's Go!</button>
            </div>
        </section>

        <header id="app-header" class="hidden">
            <div class="header-content">
                <span class="app-name">Engineering Life</span>
                <i class="fas fa-search"></i>
            </div>
        </header>

        <section id="home-page" class="page hidden with-header with-footer">
            <h2>All Courses</h2>
            <div id="courses-grid" class="grid-container"></div>
        </section>

        <section id="my-book-page" class="page hidden with-header with-footer">
            <h2>My Enrolled Courses</h2>
            <div id="enrolled-courses-grid" class="grid-container"></div>
        </section>

        <section id="course-detail-page" class="page hidden with-header with-footer">
             <button id="back-to-my-book" class="back-button"><i class="fas fa-arrow-left"></i> Back</button>
            <h2 id="course-detail-title">Course Units</h2>
            <div id="units-list"></div>
        </section>

        <section id="unit-view-page" class="page hidden with-header with-footer">
            <button id="back-to-units" class="back-button"><i class="fas fa-arrow-left"></i> Back to Units</button>
            <h2 id="unit-title">Unit Title</h2>
            <div id="unit-content">
                <div id="video-container"></div>
                <div id="audio-container"></div>
                <div id="text-container"></div>
                <button id="complete-unit-btn">Mark as Complete</button>
            </div>
        </section>

        <section id="profile-page" class="page hidden with-header with-footer">
            <h2>My Profile</h2>
            <div class="profile-card">
                <p><strong>Name:</strong> <span id="profile-name"></span></p>
                <p><strong>Email:</strong> <span id="profile-email"></span></p>
                <p><strong>Mobile:</strong> <span id="profile-mobile"></span></p>
                <p><strong>Branch:</strong> <span id="profile-branch"></span></p>
            </div>
            <div class="profile-actions">
                <button class="profile-btn"><i class="fas fa-question-circle"></i> Help</button>
                <button class="profile-btn"><i class="fas fa-envelope"></i> Feedback</button>
                <button id="logout-btn" class="profile-btn danger"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </section>

    </main>

    <a href="chat.html">
        <button id="chat-bot-btn">
            <i class="fas fa-comment-dots"></i>
        </button>
    </a>

    <footer id="app-footer" class="hidden">
        <nav>
            <a href="#home" class="nav-link active" data-page="home-page"><i class="fas fa-home"></i><span>Home</span></a>
            <a href="#my-book" class="nav-link" data-page="my-book-page"><i class="fas fa-book"></i><span>My Book</span></a>
            <a href="#profile" class="nav-link" data-page="profile-page"><i class="fas fa-user"></i><span>Profile</span></a>
            <!-- PIX Button in Footer -->
            <button id="pix-btn" class="pix-button" type="button"><i class="fas fa-link"></i> Doubt</button>
        </nav>
    </footer>

    <!-- supabase-js is loaded as an ES module inside supabase.js — no separate
         UMD <script> tag needed here, that would just create a second,
         unused client library instance. -->
    <script type="module" src="supabase.js"></script>
    <script type="module" src="app.js"></script>

    <script>
        // PIX button click event
        document.addEventListener("DOMContentLoaded", () => {
            const pixBtn = document.getElementById("pix-btn");
            if (pixBtn) {
                pixBtn.addEventListener("click", () => {
                    // இங்கே உங்க link வை
                    window.open("https://9000-firebase-studio-1756116004685.cluster-bg6uurscprhn6qxr6xwtrhvkf6.cloudworkstations.dev/question/q-r9nf6o361", "_blank");
                });
            }
        });
    </script>

</body>
</html>
